<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập – Admin Chùa Đại Khánh</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0d05 0%, #500a14 50%, #7a0c1e 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%; max-width: 400px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    text-align: center;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo { font-size: 52px; margin-bottom: 12px; }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 600;
    color: #500a14;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }

  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 600;
    color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .form-group input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid #e5d8c0; border-radius: 10px;
    font-size: 15px; font-family: inherit;
    background: #faf5ea;
    transition: border-color 0.2s, box-shadow 0.2s;
    color: #1a0d05;
  }
  .form-group input:focus {
    outline: none;
    border-color: #7a0c1e;
    box-shadow: 0 0 0 3px rgba(122,12,30,0.1);
    background: #fff;
  }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7a0c1e, #500a14);
    color: #fff; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin-top: 8px;
    transition: all 0.2s; letter-spacing: 0.02em;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(122,12,30,0.4); }
  .btn:active { transform: translateY(0); }

  .error {
    background: #fee2e2; border: 1px solid #fca5a5;
    border-radius: 10px; padding: 12px 16px;
    color: #991b1b; font-size: 13px;
    margin-bottom: 20px; display: none;
  }
  .error.show { display: block; }

  .footer { margin-top: 28px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏛️</div>
  <div class="title">Chùa Đại Khánh</div>
  <div class="subtitle">Trang quản trị – Chỉ dành cho Ban quản lý</div>

  <div class="error" id="err-box">
    ❌ Tài khoản hoặc mật khẩu không đúng. Vui lòng thử lại.
  </div>

  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label>Tài khoản</label>
      <input type="text" name="username" placeholder="Nhập tài khoản" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">🔐 Đăng nhập</button>
  </form>

  <div class="footer">🪷 Nam Mô A Di Đà Phật 🪷</div>
</div>

<script>
  // Hiện thông báo lỗi nếu sai mật khẩu
  if (new URLSearchParams(location.search).get('err') === '1') {
    document.getElementById('err-box').classList.add('show');
  }
</script>
</body>
</html>
